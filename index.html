        <meta http-equiv="X-UA-Compatible" content="ie-edge" />
        <title></title>

        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet" />

        <!-- Loading screen styles have to be inline in the HTML so that it occurs before other content finishes downloading -->
        <style>
            #preRender {
                width: 100%;
                height: 100vh;
                background-color: #fff;
                color: #424242;
                display: flex;
                flex-direction: column;
                justify-content: center;
                text-align: center;
                font-weight: bold;
                z-index: 10;
                position: absolute;
                top: 0;
                left: 0;
                opacity: 1;
                transition: opacity 0.5s;
                font-size: 24px;
                font-family: 'Valera Round', sans-serif;
                overflow: hidden;
            }

            #preRender img {
                height: 4em;
                margin-bottom: 1.5em;
                animation-name: preRenderImg;
                animation-duration: 1s;
                animation-iteration-count: infinite;
                animation-direction: alternate;
                animation-timing-function: ease-out;
            }

            @keyframes preRenderImg {
                from {
                    transform: scale(1);
                }
                to {
                    transform: scale(1.1);
                }
            }
        </style>
    </head>
    <body>
        <!-- The loading screen has to happen inline in the HTML so that it occurs as fast as possible, before other content finishes downloading -->
        <script>
            (function () {
                var minLoadTime = 500;
                var loaded = false;
                var timedOut = false;
                function onLoad() {
                    if (!loaded || !timedOut) {
                        return;
                    }
                    var el = document.getElementById('preRender');
                    el.style.opacity = '0';
                    setTimeout(function () {
                        el.parentNode.removeChild(el);
                    }, 500);
                    document.getElementById('root').style.visibility = '';
                }
                window.addEventListener('load', function () {
                    loaded = true;
                    onLoad();
                });
                setTimeout(function () {
                    timedOut = true;
                    onLoad();
                }, minLoadTime);
            })();
        </script>
        <div id="preRender">
            <img src="https://www.q-int.com/assets/logo.svg" />
            <p>Your time, our responsibility</p>
        </div>

        <div id="root" style="visibility: none"></div>
        <script src="index.js"></script>
